<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — Gurjot Mann, CPA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,500&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #faf6ef; color: #1d2620;
      font-family: Inter, system-ui, sans-serif;
      min-height: 100vh; display: grid; place-items: center;
      text-align: center; padding: 28px;
      background-image: radial-gradient(#e5ddcb 1px, transparent 1px);
      background-size: 26px 26px;
    }
    .num {
      font-family: Fraunces, Georgia, serif; font-weight: 500;
      font-size: clamp(90px, 18vw, 160px); line-height: 1;
      color: #0e5e45; letter-spacing: -0.03em;
    }
    .num em { font-style: italic; color: #b98a2f; }
    h1 { font-family: Fraunces, Georgia, serif; font-weight: 500; font-size: 26px; margin: 14px 0 8px; }
    p { color: #5c6862; font-size: 15px; margin-bottom: 28px; }
    a.home {
      display: inline-block; background: #0e5e45; color: #faf6ef;
      font-size: 14px; font-weight: 600; text-decoration: none;
      padding: 12px 26px; border-radius: 999px;
      transition: background 0.2s, transform 0.2s;
    }
    a.home:hover { background: #0a4634; transform: translateY(-2px); }
  </style>
</head>
<body>
  <div>
    <div class="num">4<em>0</em>4</div>
    <h1>Page not found.</h1>
    <p>Gurjot isn't here — but he's just one click away.</p>
    <a class="home" href="/">Back to home</a>
  </div>
</body>
</html>
